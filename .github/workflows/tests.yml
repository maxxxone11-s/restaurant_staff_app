name: tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: 90ab7c244a156c04f99dbd757d4e321f5cf120f7804afb5cb0fc2fb7324d15fa
      DATABASE_URL: postgresql+asyncpg://postgres:010SS@localhost:5432/restaurant_db
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:010SS@localhost:5432/test_restaurant_db
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 010SS
          POSTGRES_DB: test_restaurant_db

        ports:
          - 5432:5432
        
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7

        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check app imports
        run: |
          python -c "from app.main import app; print('App imported successfully')"
      
      - name: Run tests
        run: |
          pytest
    